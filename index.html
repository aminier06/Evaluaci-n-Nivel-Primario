<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Resultados de Evaluaciones – Nivel Primario 2025-2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Informe interactivo en Power BI con los resultados de la evaluación diagnóstica y de seguimiento del Nivel Primario, año escolar 2025-2026." />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #f0f0f0;
            color: #222;
            line-height: 1.4;
        }

        /* MEMBRETE INSTITUCIONAL */
        header.membrete {
            background-color: #ffffff;
            padding: 1.5rem 1rem 1.25rem;
            text-align: center;
            border-bottom: 2px solid #004578;
        }

        header.membrete h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #003366;
        }

        header.membrete h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 0.4rem;
            color: #004a80;
        }

        header.membrete h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-top: 0.25rem;
            color: #333333;
        }

        header.membrete h4 {
            font-size: 1.05rem;
            margin-top: 1.8rem; /* “dos espacios” respecto a las líneas anteriores */
            font-weight: 600;
            color: #000000;
        }

        main {
            padding: 1.5rem 1rem;
        }

        .report-wrapper {
            max-width: 1400px;
            margin: 0 auto;
        }

        .report-card {
            background: #ffffff;
            border-radius: 10px;
            padding: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .report-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            overflow: hidden;
            border-radius: 6px;
        }

        .report-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        footer {
            text-align: center;
            font-size: 0.85rem;
            color: #444;
            margin: 1.5rem 0 1rem;
            opacity: 0.95;
        }

        footer span {
            font-weight: 600;
        }
    </style>
</head>

<body>

<!-- MEMBRETE INSTITUCIONAL -->
<header class="membrete">
    <h1>Ministerio de Educación</h1>
    <h2>Viceministerio de Servicios Técnicos y Pedagógicos</h2>
    <h3>Dirección de Educación Primaria</h3>

    <h4>Resultados de Evaluaciones Diagnóstica y de Seguimiento<br>
        Año Lectivo 2025-2026
    </h4>
</header>

<main>
    <div class="report-wrapper">
        <div class="report-card">
            <div class="report-container">
                <iframe 
                    title="Evaluación Diagnóstica y de Seguimiento Nivel Primario 2025-2026"
                    src="https://app.powerbi.com/view?r=eyJrIjoiZWE0NjFhYWYtY2M5ZS00ZDQ4LWFiZDAtNmU1ZGZkYTVjNWViIiwidCI6IjY2ZTI4OThiLTJjMzUtNDMzZi1hNzUzLWJkNjRhY2EzOWFmYiIsImMiOjF9"
                    frameborder="0"
                    allowfullscreen="true">
                </iframe>
            </div>
        </div>
    </div>
</main>

<footer>
    © 2025 Ministerio de Educación – Desarrollado por <strong>Aneudy Minier</strong>
  </footer>
</body>
</html>
