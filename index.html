<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Ministerio de Educación – Evaluación Diagnóstica y Seguimiento 2025-2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Informe interactivo en Power BI con los resultados de la evaluación diagnóstica y de seguimiento del Nivel Primario, año escolar 2025-2026." />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #f5f5f5;
            color: #222;
        }

        header {
            background-color: #004578;
            color: #fff;
            padding: 1rem 1.5rem;
            text-align: center;
        }

        header h1 { font-size: 1.2rem; margin-bottom: 0.25rem; }
        header p { font-size: 0.9rem; opacity: 0.9; }

        main { padding: 1rem; }

        .report-wrapper {
            max-width: 1400px;
            margin: 0 auto;
        }

        .report-card {
            background: #ffffff;
            border-radius: 10px;
            padding: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .report-title {
            font-size: 1rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: #333;
        }

        .report-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            overflow: hidden;
            border-radius: 6px;
        }

        .report-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        footer {
            text-align: center;
            font-size: 0.85rem;
            color: #444;
            margin: 1.5rem 0 1rem;
            opacity: 0.95;
        }

        footer span { font-weight: 600; }
    </style>
</head>

<body>

<header>
    <h1>Ministerio de Educación – Nivel Primario</h1>
    <p>Evaluación Diagnóstica y de Seguimiento · Año escolar 2025-2026</p>
</header>

<main>
    <div class="report-wrapper">
        <div class="report-card">
            <div class="report-title">
                Resultados por Regionales, Distritos, Centros y Grados
            </div>

            <div class="report-container">

                <!-- 🔽 Tu informe REAL de Power BI -->
                <iframe 
                    title="Evaluación Diagnóstica y de Seguimiento Nivel Primario 2025-2026"
                    src="https://app.powerbi.com/view?r=eyJrIjoiZWE0NjFhYWYtY2M5ZS00ZDQ4LWFiZDAtNmU1ZGZkYTVjNWViIiwidCI6IjY2ZTI4OThiLTJjMzUtNDMzZi1hNzUzLWJkNjRhY2EzOWFmYiIsImMiOjF9"
                    frameborder="0"
                    allowfullscreen="true">
                </iframe>
                <!-- 🔼 Fin del iframe -->

            </div>
        </div>
    </div>
</main>

<footer>
    © 2025 Ministerio de Educación – Desarrollado por <strong>Aneudy Minier</strong>
  </footer>
</body>
</html>
